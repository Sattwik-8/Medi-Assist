        generateValue: true
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: CONTACT_RECIPIENT
        value: sattwikdhara70@gmail.com
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash-lite
      - key: FLASK_DEBUG
        value: false
    healthCheckPath: /
